<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Document</title>
</head>

<body class="bg-gray-100 flex flex-col items-center justify-center min-h-screen" >

    
     <!-- 🔹 TÍTULO CENTRADO ARRIBA -->
    <h1 class="text-3xl font-bold text-white mb-6 text-center w-full">
        Sistema de Gestión AMFE
    </h1>
 
       <div class="login-container flex flex-col items-center justify-center p-12 text-white relative">
 
        <img src="../static/img/icono.png" alt="Logo Clínica" class="logo"> 
               
       
                    
                    <i class="fa-solid fa-user"></i>
                    <form method="POST" action="/">

                        <input type="text" name="usuario" class="input-field" placeholder="Usuario" required>
                        <input type="password" name="pasword" class="input-field" placeholder="Contraseña" required>
                        <button type="submit"
                            class="btn-primary w-full py-4 px-6 text-white font-semibold rounded-xl focus:outline-none focus:ring-4 focus:ring-blue-300">
                            <i class="fas fa-sign-in-alt mr-2"></i>Iniciar Sesión
                        </button>
                        <div class="flex items-center justify-between">
                            <label class="flex items-center">
                                <input type="checkbox"
                                    class="rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                                <span class="ml-2 text-sm text-gray-600">Recordarme</span>
                            </label>
                            <a href="#" class="text-sm text-blue-600 hover:text-blue-800 font-medium">¿Olvidó su
                                contraseña?</a>
                        </div>
                        
                    </form>
                     <div class="mt-8 text-center">
                            <p class="text-gray-600 text-sm">¿No tiene una cuenta?</p>
                            <button onclick="showRegister()" class="text-blue-600 hover:text-blue-800 font-semibold mt-1">
                                Registrarse aquí
                            </button>
                        </div>
     
            </div>

</body>

</html>
